<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<input type="text" id="search" placeholder="Search images...">

<div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('architecture')">Architecture</button>
    <button onclick="filterImages('tech')">Tech</button>
</div>

<div class="gallery">
    <img src="image1.jpg" alt="Image 1" class="nature">
    <img src="image2.jpg" alt="Image 2" class="nature">
    <img src="image3.jpg" alt="Image 3" class="architecture">
    <img src="image4.jpg" alt="Image 4" class="architecture">
    <img src="image5.jpg" alt="Image 5" class="tech">
    <img src="image6.jpg" alt="Image 6" class="tech">
</div>

<div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img id="lightbox-img" src="" alt="Large Image">
</div>

<script src="script.js"></script>

</body>
</html>
